services:
  # Node.js Backend API
  - type: web
    name: coreinventory-api
    env: node
    rootDirectory: Backend
    buildCommand: npm install
    startCommand: sh start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_3VObQ9DAonCY@ep-patient-queen-anl4hqbn.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: REDIS_URL
        fromService:
          type: redis
          name: coreinventory-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-vercel-app-url.vercel.app # TODO: Update with actual frontend URL

  # Python Celery Worker
  - type: worker
    name: coreinventory-worker
    env: python
    rootDirectory: PythonWorker
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A worker worker --loglevel=info
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: coreinventory-redis
          property: connectionString
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_3VObQ9DAonCY@ep-patient-queen-anl4hqbn.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require

databases:
  # PostgreSQL Database
  - name: coreinventory-db
    databaseName: coreinventory
    user: admin

  # Redis Database for Background Jobs & Queues
  # Note: Render now supports Redis natively in blueprints (using redis type in services or natively). 
  # However, it's typically easier to just create it as a custom service or use a managed Redis URL if on free tier.
  # If Render complains about this block, deploy Redis manually and set REDIS_URL.
